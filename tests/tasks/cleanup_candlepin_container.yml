# SPDX-License-Identifier: MIT
---
- name: Check if the candlepin container is started
  command: podman container exists candlepin
  register: __rhc_candlepin_cont_started
  failed_when: false
  changed_when: false

- name: Stop and potentionally remove Candlepin container
  command: podman stop candlepin
  when: __rhc_candlepin_cont_started.rc == 0
  changed_when: true

- name: Check if there is a stopped candlepin container
  command: podman ps -a --filter name=candlepin
  register: __rhc_candlepin_container_stopped
  failed_when: false
  changed_when: false

- name: Remove Candlepin container
  command: podman rm candlepin
  changed_when: true
  when:
    - '"candlepin" in __rhc_candlepin_container_stopped.stdout'

- name: Remove Candlepin container image
  when: __rhc_cleanup_image | d(false) | bool
  block:
    - name: Check if the image exists locally
      command: podman images -q ghcr.io/ptoscano/candlepin-unofficial
      register: __rhc_candlepin_image
      changed_when: false

    - name: Remove Candlepin container image
      command: podman rmi ghcr.io/ptoscano/candlepin-unofficial
      when: __rhc_candlepin_image.stdout | length > 0
      changed_when: true
