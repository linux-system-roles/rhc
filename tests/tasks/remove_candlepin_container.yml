---
- name: Check if the candlepin container exists
  command:
    argv:
      - podman
      - ps
      - -a
      - --filter
      - name=candlepin
  register: __rhc_candlepin_cont_exists
  changed_when: false

- name: Stop and remove Candlepin container
  command:
    argv:
      - podman
      - stop
      - candlepin
  changed_when: true
  when:
    - lsr_rhc_test_data_file | length == 0
    - '"candlepin" in __rhc_candlepin_cont_exists.stdout'
